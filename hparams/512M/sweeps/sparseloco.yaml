name: sparseloco_sweep
project:  SparseLoCo-512M
method: grid
program: train.py
command:
  - /usr/bin/env
  - torchrun
  - --nproc_per_node=8
  - ${program} 
  - ${args_no_boolean_flags}

parameters:
  # Run configuration
  strategy:
    value: sparseloco
  run_name:
    value: SparseLoCo

  # Data configuration
  shards_path:
    value: $DATA_DIR/dclm_tokenized
  token_budget:
    value: 10255073280 # [effective_bs=2**22 * H=15 * iterations=163]
  sequence_length:
    value: 2048

  # Model configuration
  hparams_file:
    value: hparams/512M/512M_model_hparams.json
  use_compile:
    value: True

  # Training configuration
  micro_batch_size:
    value: 8 # -1 to set micro_batch_size to batch_size
  batch_size:
    values: 
    - 256
  outer_learning_rate:
    values:
    - 1
  inner_learning_rate:
    values:
    - 1e-3
  inner_steps:
    values:
    - 15
  warmup_steps:
    value: 500
  weight_decay:
    value: 0.1

  # Compression configuration
  error_decay:
    value: 0.95
  top_k:
    value: 128
  chunk_size:
    value: 64
  quantization_bins:
    value: 4
  quantization_range:
    value: 6
  use_quantization:
    value: True
